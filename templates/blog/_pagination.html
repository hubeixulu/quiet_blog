{% if page_obj.has_other_pages %}<nav class="pagination" aria-label="分页">
{% if page_obj.has_previous %}<a href="?page={{ page_obj.previous_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}">← 较新</a>{% else %}<span></span>{% endif %}
<span>{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
{% if page_obj.has_next %}<a href="?page={{ page_obj.next_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}">较早 →</a>{% endif %}
</nav>{% endif %}
